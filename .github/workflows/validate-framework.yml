name: Validate Framework

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    name: Validate AI OS markdown contracts
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run framework validator
        shell: pwsh
        run: ./scripts/validate-framework.ps1

      - name: Run reference app tests
        shell: pwsh
        run: dotnet test
